<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello FREDLUG</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── slide container ─────────────────────────────── */
  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    pointer-events: none;
  }
  .slide.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* ── slide 1 – Hello FREDLUG ─────────────────────── */
  #slide-hello {
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #0d0d0d 70%);
  }

  .hello-text {
    font-size: clamp(3rem, 12vw, 9rem);
    font-weight: 900;
    letter-spacing: 0.04em;
    text-align: center;
    line-height: 1;
    background: linear-gradient(135deg, #e84393 0%, #ff6b35 35%, #f7d354 65%, #00d4aa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: pulse 3s ease-in-out infinite;
    text-shadow: none;
  }

  .subtitle {
    margin-top: 1.5rem;
    font-size: clamp(1rem, 3vw, 2rem);
    color: #888;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  .cursor {
    display: inline-block;
    width: 0.15em;
    height: 1em;
    background: #e84393;
    margin-left: 0.1em;
    vertical-align: middle;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink  { 50% { opacity: 0; } }
  @keyframes pulse  { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.25); } }

  /* floating terminal lines */
  .terminal-bg {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
  }
  .term-line {
    position: absolute;
    left: -100%;
    color: #00ff41;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    opacity: 0;
    white-space: nowrap;
    animation: slide-right linear infinite;
  }
  @keyframes slide-right {
    0%   { left: -120%; opacity: 0; }
    5%   { opacity: 0.18; }
    95%  { opacity: 0.18; }
    100% { left: 110%; opacity: 0; }
  }

  .hello-content { position: relative; z-index: 1; text-align: center; }

  /* ── slide 2 – Logo ──────────────────────────────── */
  #slide-logo {
    background: radial-gradient(ellipse at center, #111827 0%, #0d0d0d 70%);
  }

  .logo-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-wrapper::before {
    content: '';
    position: absolute;
    width: 60vmin;
    height: 60vmin;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(232,67,147,0.15) 0%, transparent 70%);
    animation: glow-pulse 2.5s ease-in-out infinite;
  }

  @keyframes glow-pulse {
    0%, 100% { transform: scale(1);   opacity: 0.6; }
    50%       { transform: scale(1.1); opacity: 1;   }
  }

  .logo-img {
    max-width: min(55vw, 55vh);
    max-height: min(55vw, 55vh);
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 0 2rem rgba(232,67,147,0.5));
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-18px); }
  }

  .logo-label {
    position: absolute;
    bottom: -3.5rem;
    font-size: clamp(0.85rem, 2.5vw, 1.4rem);
    color: #555;
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  /* ── install banner ──────────────────────────────── */
  .install-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid #1e1e1e;
    padding: 0.55rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    z-index: 20;
    font-family: 'Courier New', monospace;
    font-size: clamp(0.6rem, 1.6vw, 0.9rem);
    color: #888;
    white-space: nowrap;
    overflow: hidden;
  }
  .install-bar span.label {
    color: #444;
    flex-shrink: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 0.7em;
  }
  .install-bar span.cmd {
    color: #00d4aa;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .install-bar button.copy-btn {
    flex-shrink: 0;
    background: #1e1e2e;
    border: 1px solid #333;
    color: #aaa;
    padding: 0.2rem 0.65rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.75rem;
    transition: background 0.2s, color 0.2s;
    margin-left: auto;
  }
  .install-bar button.copy-btn:hover { background: #2a2a3e; color: #fff; }

  /* ── progress dots ───────────────────────────────── */
  .dots {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0.6rem;
    z-index: 10;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #333;
    cursor: pointer;
    transition: background 0.3s, transform 0.3s;
  }
  .dot.active { background: #e84393; transform: scale(1.3); }
</style>
</head>
<body>

<!-- Install bar -->
<div class="install-bar">
  <span class="label">Demo install&nbsp;▸</span>
  <span class="cmd" id="install-cmd">curl -o /var/www/html/index.html https://raw.githubusercontent.com/fredlug-va/linuxforwindows/main/demo-index.html</span>
  <button class="copy-btn" onclick="copyCmd()">Copy</button>
</div>

<!-- Slide 1: Hello FREDLUG -->
<div class="slide active" id="slide-hello">
  <div class="terminal-bg" id="terminal-bg"></div>
  <div class="hello-content">
    <div class="hello-text">Hello<br>FREDLUG<span class="cursor"></span></div>
    <div class="subtitle">Fredericksburg Linux Users Group</div>
  </div>
</div>

<!-- Navigation dots -->
<div class="dots">
  <div class="dot active" onclick="goTo(0)"></div>
  <div class="dot"        onclick="goTo(1)"></div>
</div>

<script>
(function () {
  'use strict';

  // ── terminal rain lines ───────────────────────────
  const commands = [
    'sudo dnf install httpd',
    'systemctl enable --now httpd',
    'firewall-cmd --add-service=http --permanent',
    'firewall-cmd --reload',
    'curl -I http://localhost',
    'journalctl -u httpd -f',
    'ss -tlnp | grep :80',
    'ls -lh /var/www/html/',
    'cat /etc/httpd/conf/httpd.conf',
    'chmod 644 /var/www/html/index.html',
    'chown apache:apache /var/www/html/',
    'semanage fcontext -l | grep httpd',
    'restorecon -Rv /var/www/html/',
    'dnf info httpd',
    'rpm -q httpd',
    'ps aux | grep httpd',
  ];

  const bg = document.getElementById('terminal-bg');
  const ROWS = 14;

  for (let i = 0; i < ROWS; i++) {
    const el = document.createElement('div');
    el.className = 'term-line';
    const top = (100 / ROWS) * i + Math.random() * 5;
    const dur = 12 + Math.random() * 16;
    const delay = -(Math.random() * dur);
    el.style.cssText = `top:${top}%;animation-duration:${dur}s;animation-delay:${delay}s`;
    el.textContent = '$ ' + commands[i % commands.length];
    bg.appendChild(el);
  }

  // ── slide switcher ────────────────────────────────
  const slides = Array.from(document.querySelectorAll('.slide'));
  const dots   = Array.from(document.querySelectorAll('.dot'));
  let current  = 0;
  let timer;

  function goTo(idx) {
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = idx;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
    resetTimer();
  }

  function next() { goTo((current + 1) % slides.length); }

  function resetTimer() {
    clearInterval(timer);
    timer = setInterval(next, 6000);
  }

  // expose for dot onclick
  window.goTo = goTo;

  // keyboard nav
  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowRight' || e.key === ' ') next();
    if (e.key === 'ArrowLeft') goTo((current - 1 + slides.length) % slides.length);
  });

  resetTimer();

  // ── copy install command ──────────────────────────
  window.copyCmd = function () {
    const text = document.getElementById('install-cmd').textContent;
    navigator.clipboard.writeText(text).then(function () {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      btn.style.color = '#00d4aa';
      setTimeout(function () { btn.textContent = 'Copy'; btn.style.color = ''; }, 2000);
    });
  };
})();
</script>
